<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 945" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eee8dc"/>
      <stop offset="0.46" stop-color="#f8f4eb"/>
      <stop offset="1" stop-color="#eee5d7"/>
    </linearGradient>
    <radialGradient id="warm" cx="18%" cy="84%" r="36%">
      <stop offset="0" stop-color="#c6b490" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#c6b490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leafGlow" cx="80%" cy="6%" r="28%">
      <stop offset="0" stop-color="#506048" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#506048" stop-opacity="0"/>
    </radialGradient>
    <pattern id="specks" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r="0.45" fill="#6b6254" opacity="0.10"/>
      <circle cx="12" cy="9" r="0.35" fill="#fff" opacity="0.42"/>
    </pattern>
    <linearGradient id="iconBg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0b332b"/>
      <stop offset="0.58" stop-color="#185444"/>
      <stop offset="1" stop-color="#3d806c"/>
    </linearGradient>
    <linearGradient id="penBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#050d0b"/>
      <stop offset="0.36" stop-color="#12312a"/>
      <stop offset="0.62" stop-color="#1f4b3d"/>
      <stop offset="1" stop-color="#07110f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d541d"/>
      <stop offset="0.38" stop-color="#d3a85b"/>
      <stop offset="0.68" stop-color="#f4d995"/>
      <stop offset="1" stop-color="#8a5a1c"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#3d3423" flood-opacity="0.16"/>
    </filter>
    <filter id="blurLeaf">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1680" height="945" fill="url(#paper)"/>
  <rect width="1680" height="945" fill="url(#warm)"/>
  <rect width="1680" height="945" fill="url(#leafGlow)"/>
  <rect width="1680" height="945" fill="url(#specks)" opacity="0.48"/>

  <g opacity="0.24" stroke="#59634f" stroke-width="7" fill="none" filter="url(#blurLeaf)" transform="translate(1382 0) rotate(-18)">
    <path d="M120 4 C102 88 95 156 110 236"/>
    <path d="M110 72 C162 42 205 34 250 50"/>
    <path d="M104 122 C156 105 206 114 250 146"/>
    <path d="M105 178 C156 172 204 194 236 236"/>
  </g>

  <g transform="translate(36 84)" fill="none" stroke="#b9ad99" stroke-opacity="0.45">
    <line x1="0" y1="0" x2="0" y2="680"/>
    <g stroke-width="1">
      <line x1="-6" y1="0" x2="6" y2="0"/><line x1="-6" y1="112" x2="6" y2="112"/>
      <line x1="-6" y1="224" x2="6" y2="224"/><line x1="-6" y1="336" x2="6" y2="336"/>
      <line x1="-6" y1="448" x2="6" y2="448"/><line x1="-6" y1="560" x2="6" y2="560"/>
      <line x1="-6" y1="680" x2="6" y2="680"/>
    </g>
    <g fill="#a9a08f" stroke="none" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" opacity="0.82">
      <text x="14" y="5">2025</text>
      <text x="14" y="117">2024</text>
      <text x="14" y="229">2023</text>
      <text x="14" y="341">2022</text>
      <text x="14" y="453">2021</text>
      <text x="14" y="565">2020</text>
      <text x="14" y="685">2019</text>
    </g>
  </g>

  <g transform="translate(252 240)">
    <g filter="url(#softShadow)">
      <rect x="0" y="0" width="126" height="126" rx="30" fill="url(#iconBg)"/>
      <circle cx="63" cy="63" r="46" fill="none" stroke="#88aa99" stroke-width="2" opacity="0.32"/>
      <circle cx="63" cy="41" r="7" fill="#fff8ea"/>
      <rect x="55" y="58" width="16" height="46" rx="2" fill="#fff8ea"/>
      <circle cx="96" cy="33" r="4" fill="#a2c2b1" opacity="0.74"/>
    </g>
    <text x="0" y="174" fill="#a37c45" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="18" font-weight="700" letter-spacing="5">只给自己看的空间</text>
    <text x="0" y="296" fill="#232423" font-family="'Songti SC', STSong, serif" font-size="88" font-weight="500" letter-spacing="18">i 人朋友圈</text>
    <rect x="0" y="334" width="43" height="2" fill="#9d7d4a"/>
    <text x="0" y="384" fill="#686d67" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="20" font-weight="700">
      <tspan x="0" dy="0">把那些不必发出去、但值得留下来的片刻，</tspan>
      <tspan x="0" dy="34">安静地收进自己的时间线。</tspan>
    </text>
  </g>

  <text x="1516" y="80" fill="#707670" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16" font-weight="700">▣ 本地私密空间</text>

  <g transform="translate(-8 690) rotate(-11)" filter="url(#softShadow)">
    <rect x="0" y="0" width="406" height="232" rx="3" fill="#f9f4e7"/>
    <rect x="14" y="14" width="380" height="204" fill="#eee4cf" opacity="0.38"/>
    <path d="M0 0 C120 18 238 10 406 0 L406 232 L0 232Z" fill="#fffaf0" opacity="0.76"/>
    <g stroke="#c9bda4" stroke-width="1" opacity="0.34">
      <line x1="58" y1="74" x2="232" y2="74"/>
      <line x1="58" y1="118" x2="232" y2="118"/>
      <line x1="58" y1="162" x2="232" y2="162"/>
    </g>
    <text x="62" y="104" fill="#8f8a80" opacity="0.58" font-family="'Songti SC', STSong, serif" font-size="19">
      <tspan x="62" dy="0">记录，为了更好地</tspan>
      <tspan x="62" dy="38">遇见自己。</tspan>
    </text>
    <g transform="translate(298 76) rotate(-30)">
      <rect x="-14" y="34" width="28" height="158" rx="14" fill="url(#penBody)"/>
      <rect x="-17" y="70" width="34" height="56" rx="12" fill="url(#gold)"/>
      <path d="M0 0 L18 46 L8 60 L-8 60 L-18 46Z" fill="url(#gold)"/>
      <line x1="0" y1="9" x2="0" y2="56" stroke="#6b4817" stroke-width="1" opacity="0.38"/>
    </g>
  </g>

  <g transform="translate(1068 875)" fill="#998a70" opacity="0.62" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="700">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#b8ab93"/>
    <text x="90" y="5">私密 · 安静 · 自由 · 收录生活的细微光芒</text>
    <line x1="455" y1="0" x2="525" y2="0" stroke="#b8ab93"/>
  </g>
</svg>
